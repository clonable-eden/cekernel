name: plugin release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version (e.g. 0.3.0)'
        required: true
      plugin:
        description: 'Plugin name'
        required: true
        default: 'cekernel'

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: ${{ inputs.version }} (expected X.Y.Z)"
            exit 1
          fi

      - name: Validate plugin exists
        run: |
          if [[ ! -f "${{ inputs.plugin }}/.claude-plugin/plugin.json" ]]; then
            echo "::error::Plugin not found: ${{ inputs.plugin }}"
            exit 1
          fi

      - name: Create release branch and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PLUGIN="${{ inputs.plugin }}"
          VERSION="${{ inputs.version }}"
          BRANCH="release/${PLUGIN}-v${VERSION}"
          TAG="${PLUGIN}-v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"

          jq --arg v "${VERSION}" '.version = $v' \
            "${PLUGIN}/.claude-plugin/plugin.json" > tmp.json
          mv tmp.json "${PLUGIN}/.claude-plugin/plugin.json"

          git add "${PLUGIN}/.claude-plugin/plugin.json"
          git commit -m "release: ${PLUGIN} v${VERSION}"
          git push -u origin "${BRANCH}"

          BODY="$(cat <<EOF
          ## Release ${PLUGIN} v${VERSION}

          Version bump for ${PLUGIN} plugin.

          - Updates \`${PLUGIN}/.claude-plugin/plugin.json\` version to \`${VERSION}\`
          - On merge, \`plugin-release-tag.yml\` will automatically create tag \`${TAG}\` and GitHub Release
          EOF
          )"

          gh pr create \
            --title "release: ${PLUGIN} v${VERSION}" \
            --body "${BODY}"
