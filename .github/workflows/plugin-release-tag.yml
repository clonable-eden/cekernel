name: plugin release tag

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  tag-and-release:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      MARKETPLACE_PAT: ${{ secrets.MARKETPLACE_PAT }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract plugin and version
        id: extract
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          # release/cekernel-v1.2.0 → cekernel-v1.2.0
          TAG="${BRANCH#release/}"
          # cekernel-v1.2.0 → cekernel
          PLUGIN="${TAG%-v*}"
          # cekernel-v1.2.0 → 1.2.0
          VERSION="${TAG##*-v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "plugin=${PLUGIN}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.extract.outputs.tag }}"
          PLUGIN="${{ steps.extract.outputs.plugin }}"

          if [ -f RELEASE_NOTES.md ]; then
            # Extract section for this version (from "# <TAG>" to next "---" or EOF)
            awk -v tag="# ${TAG}" \
              '$0==tag{f=1;next} f&&/^---$/{exit} f&&s==0&&/^$/{next} f{s=1;print}' \
              RELEASE_NOTES.md > /tmp/release-body.md
            gh release create "${TAG}" \
              --title "${TAG}" \
              --notes-file /tmp/release-body.md
          else
            PREV_TAG=$(git tag -l "${PLUGIN}-v*" --sort=-v:refname | head -1)
            if [ -n "${PREV_TAG}" ]; then
              gh release create "${TAG}" \
                --title "${TAG}" \
                --generate-notes \
                --notes-start-tag "${PREV_TAG}"
            else
              gh release create "${TAG}" \
                --title "${TAG}" \
                --generate-notes
            fi
          fi

      - name: Checkout plugins repository
        if: env.MARKETPLACE_PAT != ''
        uses: actions/checkout@v6
        with:
          repository: clonable-eden/plugins
          token: ${{ secrets.MARKETPLACE_PAT }}
          path: plugins-checkout

      - name: Update marketplace
        if: env.MARKETPLACE_PAT != ''
        env:
          GH_TOKEN: ${{ secrets.MARKETPLACE_PAT }}
        run: |
          TAG="${{ steps.extract.outputs.tag }}"
          PLUGIN="${{ steps.extract.outputs.plugin }}"

          cd ${{ github.workspace }}/plugins-checkout
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          jq --arg ref "${TAG}" \
            '(.plugins[] | select(.name == "'"${PLUGIN}"'") | .source).ref = $ref' \
            .claude-plugin/marketplace.json > tmp.json
          mv tmp.json .claude-plugin/marketplace.json

          BRANCH="chore/${TAG}"
          git checkout -b "${BRANCH}"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: update ${PLUGIN} to ${TAG}"
          git push -u origin "${BRANCH}"
          gh pr create \
            --title "chore: update ${PLUGIN} to ${TAG}" \
            --body "Automated update from ${PLUGIN} release."
