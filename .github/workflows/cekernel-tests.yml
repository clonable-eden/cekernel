name: cekernel tests

on:
  push:
    branches: [main]
    paths:
      - 'cekernel/**'
  pull_request:
    paths:
      - 'cekernel/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run cekernel tests
        run: bash cekernel/tests/run-tests.sh
