name: cekernel tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      cekernel: ${{ steps.filter.outputs.cekernel }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            cekernel:
              - 'scripts/**'
              - 'agents/**'
              - 'skills/**'
              - 'tests/**'
              - 'envs/**'
              - 'docs/**'
              - 'config/**'
              - '.github/workflows/cekernel-tests.yml'

  test:
    needs: changes
    if: needs.changes.outputs.cekernel == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install bats-core (pinned)
        run: |
          git clone --depth 1 --branch v1.13.0 https://github.com/bats-core/bats-core.git "${RUNNER_TEMP}/bats-core"
          echo "${RUNNER_TEMP}/bats-core/bin" >> "$GITHUB_PATH"
      - name: Run cekernel tests (bats)
        run: bats --recursive tests/

  # Ruleset required status check (reports success even when test is skipped)
  status:
    name: cekernel tests
    needs: [changes, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        run: |
          if [ "${{ needs.test.result }}" == "failure" ]; then
            echo "Test job failed"
            exit 1
          fi
          echo "cekernel tests passed (test skipped or succeeded)"
