name: cekernel tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      cekernel: ${{ steps.filter.outputs.cekernel }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            cekernel:
              - 'scripts/**'
              - 'agents/**'
              - 'skills/**'
              - 'tests/**'
              - 'envs/**'
              - 'docs/**'
              - 'config/**'
              - '.github/workflows/cekernel-tests.yml'

  test:
    needs: changes
    if: needs.changes.outputs.cekernel == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install bats-core (pinned)
        run: |
          git clone --depth 1 --branch v1.13.0 https://github.com/bats-core/bats-core.git "${RUNNER_TEMP}/bats-core"
          echo "${RUNNER_TEMP}/bats-core/bin" >> "$GITHUB_PATH"
      - name: "Run cekernel tests (dual-lane: legacy harness + bats)"
        run: bash tests/run-tests.sh

  # Ruleset required status check (reports success even when test is skipped)
  status:
    name: cekernel tests
    needs: [changes, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        run: |
          if [ "${{ needs.test.result }}" == "failure" ]; then
            echo "Test job failed"
            exit 1
          fi
          echo "cekernel tests passed (test skipped or succeeded)"
