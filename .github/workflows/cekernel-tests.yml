name: cekernel tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      cekernel: ${{ steps.filter.outputs.cekernel }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            cekernel:
              - 'scripts/**'
              - 'agents/**'
              - 'skills/**'
              - 'tests/**'
              - 'envs/**'
              - 'docs/**'
              - 'config/**'
              - '.github/workflows/cekernel-tests.yml'

  test:
    needs: changes
    if: needs.changes.outputs.cekernel == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run cekernel tests
        run: bash tests/run-tests.sh

  # Ruleset required status check (reports success even when test is skipped)
  status:
    name: cekernel tests
    needs: [changes, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        run: |
          if [ "${{ needs.test.result }}" == "failure" ]; then
            echo "Test job failed"
            exit 1
          fi
          echo "cekernel tests passed (test skipped or succeeded)"
