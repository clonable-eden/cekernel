name: Auto-approve Renovate PRs

on:
  pull_request:

permissions:
  pull-requests: write

jobs:
  auto-approve:
    if: github.actor == 'renovate[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review --approve "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}"
